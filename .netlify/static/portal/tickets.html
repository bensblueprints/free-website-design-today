<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Tickets | Client Portal | FreeWebsiteDesign.today</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0a0a0a;--bg-card:#111111;--gold:#c9a962;--gold-light:#d4b978;--text:#f5f3ef;--text-muted:#8a8880;--border:rgba(255,255,255,0.08);--font-display:'Cormorant Garamond',Georgia,serif;--font-body:'DM Sans',-apple-system,sans-serif;--radius-sm:6px;--radius-lg:12px;--green:#34d399;--yellow:#fbbf24;--red:#ef4444; }
        * { margin:0;padding:0;box-sizing:border-box; }
        body { font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh; }
        h1,h2,h3 { font-family:var(--font-display);font-weight:600;line-height:1.1; }
        .text-gradient { background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
        a { color:var(--gold);text-decoration:none; }
        .header { padding:1rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,10,0.95);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px); }
        .header-left { display:flex;align-items:center;gap:1.5rem; }
        .header-logo { display:flex;align-items:center;gap:0.5rem;text-decoration:none;color:var(--text); }
        .header-logo svg { flex-shrink:0; }
        .header-logo span { font-family:var(--font-display);font-size:1rem;font-weight:600; }
        .header-badge { font-size:0.65rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);background:rgba(201,169,98,0.1);padding:0.25rem 0.6rem;border-radius:4px; }
        .header-nav { display:flex;align-items:center;gap:1rem; }
        .header-nav a { font-size:0.8rem;font-weight:600;color:var(--text-muted);padding:0.4rem 0.8rem;border-radius:var(--radius-sm); }
        .header-nav a:hover { color:var(--gold); }
        .header-nav a.active { color:var(--gold);background:rgba(201,169,98,0.1); }
        .btn-logout { background:none;border:1px solid var(--border);color:var(--text-muted);padding:0.4rem 1rem;border-radius:var(--radius-sm);font-size:0.75rem;font-weight:600;cursor:pointer;font-family:var(--font-body); }
        .container { max-width:1100px;margin:0 auto;padding:2rem; }
        .loading { text-align:center;padding:4rem; }
        .loading-spinner { width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem; }
        @keyframes spin { to { transform:rotate(360deg); } }

        .ticket-list { display:flex;flex-direction:column;gap:0.5rem;margin-bottom:2rem; }
        .ticket-row { background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color 0.2s;gap:1rem; }
        .ticket-row:hover { border-color:rgba(201,169,98,0.2); }
        .ticket-row .subject { font-weight:600;font-size:0.9rem; }
        .ticket-row .meta { font-size:0.75rem;color:var(--text-muted);margin-top:0.15rem; }
        .ticket-row .badge { font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:0.2rem 0.5rem;border-radius:3px;flex-shrink:0; }
        .badge-open { background:rgba(251,191,36,0.15);color:var(--yellow); }
        .badge-answered { background:rgba(52,211,153,0.15);color:var(--green); }
        .badge-closed { background:rgba(255,255,255,0.05);color:var(--text-muted); }

        .thread-panel { background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden; }
        .thread-header { padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center; }
        .thread-header h2 { font-size:1.2rem; }
        .thread-actions { display:flex;gap:0.5rem; }
        .thread-actions button { background:none;border:1px solid var(--border);color:var(--text-muted);padding:0.3rem 0.8rem;border-radius:4px;font-size:0.7rem;font-weight:600;cursor:pointer;font-family:var(--font-body); }
        .thread-actions button:hover { border-color:var(--gold);color:var(--gold); }
        .messages { max-height:500px;overflow-y:auto;padding:1rem 1.25rem; }
        .msg { padding:0.75rem;margin-bottom:0.5rem;border-radius:8px; }
        .msg-client { background:rgba(255,255,255,0.03); }
        .msg-agency { background:rgba(201,169,98,0.08); }
        .msg .sender { font-size:0.65rem;font-weight:600;color:var(--text-muted);margin-bottom:0.2rem; }
        .msg .body { font-size:0.85rem;white-space:pre-wrap;line-height:1.5; }
        .msg .time { font-size:0.6rem;color:var(--text-muted);margin-top:0.3rem; }
        .reply-box { padding:1rem 1.25rem;border-top:1px solid var(--border); }
        .reply-box textarea { width:100%;min-height:80px;padding:0.75rem;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);font-size:0.85rem;resize:vertical;outline:none; }
        .reply-box textarea:focus { border-color:var(--gold); }
        .reply-actions { display:flex;justify-content:flex-end;margin-top:0.5rem; }
        .btn-sm { padding:0.5rem 1rem;background:var(--gold);color:#0a0a0a;border:none;border-radius:4px;font-weight:700;font-size:0.75rem;cursor:pointer;font-family:var(--font-body);text-transform:uppercase; }
        .btn-sm:hover { background:var(--gold-light); }
        .empty { text-align:center;padding:3rem;color:var(--text-muted);font-size:0.9rem; }
        .filter-bar { display:flex;gap:0.5rem;margin-bottom:1.5rem; }
        .filter-btn { background:none;border:1px solid var(--border);color:var(--text-muted);padding:0.4rem 0.8rem;border-radius:4px;font-size:0.75rem;font-weight:600;cursor:pointer;font-family:var(--font-body); }
        .filter-btn.active { border-color:var(--gold);color:var(--gold);background:rgba(201,169,98,0.08); }
        .footer { padding:2rem;border-top:1px solid var(--border);text-align:center; }
        .footer p { font-size:0.7rem;color:var(--text-muted); }
        @media(max-width:768px) { .container { padding:1.25rem 1rem; } .ticket-row { flex-direction:column;align-items:flex-start; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <a href="/" class="header-logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#c9a962" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                <span>FreeWebsiteDesign.today</span>
            </a>
            <span class="header-badge">Tickets</span>
        </div>
        <div class="header-nav">
            <a href="/portal/dashboard.html">Dashboard</a>
            <a href="/portal/admin.html">All Clients</a>
            <a href="/portal/tickets.html" class="active">Tickets</a>
            <a href="/portal/settings.html">Settings</a>
            <button class="btn-logout" onclick="logout()">Log Out</button>
        </div>
    </div>

    <div class="loading" id="loadingState"><div class="loading-spinner"></div></div>

    <div class="container" id="mainContent" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
            <div>
                <h1 style="font-size:clamp(1.6rem,4vw,2.2rem);">Support <span class="text-gradient">Tickets</span></h1>
                <p style="color:var(--text-muted);font-size:0.9rem;" id="ticketCount"></p>
            </div>
        </div>
        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" onclick="filterTickets('all')">All</button>
            <button class="filter-btn" onclick="filterTickets('open')">Open</button>
            <button class="filter-btn" onclick="filterTickets('answered')">Answered</button>
            <button class="filter-btn" onclick="filterTickets('closed')">Closed</button>
        </div>
        <div id="ticketListView"></div>
        <div id="ticketThreadView" style="display:none;"></div>
    </div>

    <div class="footer"><p>&copy; 2026 FreeWebsiteDesign.today. All rights reserved.</p></div>

    <script>
    var API = '';
    var token = localStorage.getItem('cp_token');
    if (!token) window.location.href = '/portal/';
    function logout() { localStorage.removeItem('cp_token'); localStorage.removeItem('cp_client'); window.location.href = '/portal/'; }
    function h(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function fmtDate(d) { if(!d)return'—'; var dt=new Date(d); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }

    function apiFetch(path, opts) {
        opts = opts || {};
        opts.headers = Object.assign({ Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' }, opts.headers || {});
        return fetch(API + path, opts).then(function(r) { if (r.status === 401) logout(); if (r.status === 403) { window.location.href = '/portal/dashboard.html'; } return r.json(); });
    }

    var allTickets = [];
    var currentFilter = 'all';

    async function loadTickets() {
        var tickets = await apiFetch('/api/portal/admin/tickets');
        allTickets = tickets || [];
        document.getElementById('ticketCount').textContent = allTickets.length + ' ticket' + (allTickets.length !== 1 ? 's' : '');
        renderTicketList();
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('mainContent').style.display = '';
    }

    function filterTickets(status) {
        currentFilter = status;
        document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
        event.target.classList.add('active');
        renderTicketList();
    }

    function renderTicketList() {
        var filtered = currentFilter === 'all' ? allTickets : allTickets.filter(function(t) { return t.status === currentFilter; });
        var el = document.getElementById('ticketListView');
        document.getElementById('ticketThreadView').style.display = 'none';
        el.style.display = '';

        if (!filtered.length) { el.innerHTML = '<div class="empty">No tickets' + (currentFilter !== 'all' ? ' with status "' + currentFilter + '"' : '') + '.</div>'; return; }

        el.innerHTML = '<div class="ticket-list">' + filtered.map(function(t) {
            var badgeCls = 'badge-' + t.status;
            return '<div class="ticket-row" onclick="openThread(\'' + t.id + '\')">' +
                '<div style="flex:1;min-width:0;">' +
                    '<div class="subject">' + h(t.subject) + '</div>' +
                    '<div class="meta">' + h(t.client_name || '') + (t.business_name ? ' (' + h(t.business_name) + ')' : '') + ' &middot; ' + fmtDate(t.updated_at) + ' &middot; ' + (t.message_count || 0) + ' messages</div>' +
                '</div>' +
                '<span class="badge ' + badgeCls + '">' + t.status + '</span>' +
            '</div>';
        }).join('') + '</div>';
    }

    async function openThread(ticketId) {
        var data = await apiFetch('/api/portal/tickets/' + ticketId + '/messages');
        if (!data || !data.ticket) return;
        var ticket = data.ticket;
        var messages = data.messages || [];

        document.getElementById('ticketListView').style.display = 'none';
        var el = document.getElementById('ticketThreadView');
        el.style.display = '';
        el.innerHTML = '<div style="margin-bottom:1rem;"><button onclick="backToList()" style="background:none;border:none;color:var(--gold);cursor:pointer;font-size:0.8rem;">&larr; Back to tickets</button></div>' +
            '<div class="thread-panel">' +
                '<div class="thread-header">' +
                    '<h2>' + h(ticket.subject) + '</h2>' +
                    '<div class="thread-actions">' +
                        (ticket.status !== 'closed' ? '<button onclick="closeTicket(\'' + ticketId + '\')">Close</button>' : '<button onclick="reopenTicket(\'' + ticketId + '\')">Reopen</button>') +
                    '</div>' +
                '</div>' +
                '<div class="messages" id="threadMessages">' +
                    messages.map(function(m) {
                        var cls = m.sender_type === 'agency' ? 'msg msg-agency' : 'msg msg-client';
                        return '<div class="' + cls + '">' +
                            '<div class="sender">' + h(m.sender_name) + ' &middot; ' + (m.sender_type === 'agency' ? 'Agency' : 'Client') + '</div>' +
                            '<div class="body">' + h(m.message) + '</div>' +
                            '<div class="time">' + fmtDate(m.created_at) + '</div>' +
                        '</div>';
                    }).join('') +
                '</div>' +
                '<div class="reply-box">' +
                    '<textarea id="replyText" placeholder="Type your reply... (client will be notified by email)"></textarea>' +
                    '<div class="reply-actions"><button class="btn-sm" onclick="sendReply(\'' + ticketId + '\')">Send Reply</button></div>' +
                '</div>' +
            '</div>';

        setTimeout(function() { var m = document.getElementById('threadMessages'); if(m) m.scrollTop = m.scrollHeight; }, 100);
    }

    function backToList() { renderTicketList(); }

    async function sendReply(ticketId) {
        var text = document.getElementById('replyText').value.trim();
        if (!text) return;
        await apiFetch('/api/portal/tickets/' + ticketId + '/messages', { method: 'POST', body: JSON.stringify({ message: text }) });
        openThread(ticketId);
        loadTickets();
    }

    async function closeTicket(id) {
        await apiFetch('/api/portal/admin/tickets/' + id, { method: 'PATCH', body: JSON.stringify({ status: 'closed' }) });
        loadTickets();
        openThread(id);
    }

    async function reopenTicket(id) {
        await apiFetch('/api/portal/admin/tickets/' + id, { method: 'PATCH', body: JSON.stringify({ status: 'open' }) });
        loadTickets();
        openThread(id);
    }

    loadTickets();
    </script>
</body>
</html>
