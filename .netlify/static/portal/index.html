<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Client Portal | FreeWebsiteDesign.today</title>
    <meta name="description" content="Access your FreeWebsiteDesign.today client portal to view project status, invoices, and communicate with our team.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --bg-card: #111111; --bg-card-hover: #161616;
            --gold: #c9a962; --gold-light: #d4b978; --gold-dark: #a88c4a;
            --text: #f5f3ef; --text-muted: #8a8880; --border: rgba(255,255,255,0.08);
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'DM Sans', -apple-system, sans-serif;
            --radius-sm: 6px; --radius-lg: 12px;
            --transition-fast: 0.3s ease;
            --green: #34d399; --red: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); background: var(--bg); color: var(--text); line-height: 1.7; min-height: 100vh; display: flex; flex-direction: column; }
        h1 { font-family: var(--font-display); font-weight: 600; line-height: 1.1; }
        .text-gradient { background: linear-gradient(135deg, var(--gold), var(--gold-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        a { color: var(--gold); }
        .header { padding: 1.25rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .header-logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--text); }
        .header-logo svg { flex-shrink: 0; }
        .header-logo span { font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; }
        .header .badge { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); }
        .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; position: relative; }
        .login-wrapper::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 30%, rgba(201,169,98,0.06) 0%, transparent 60%); }
        .login-card { position: relative; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 3rem; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-card h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .login-card .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.4rem; }
        .form-input { width: 100%; padding: 0.85rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: var(--font-body); font-size: 0.95rem; transition: border-color var(--transition-fast); outline: none; }
        .form-input:focus { border-color: var(--gold); }
        .form-input::placeholder { color: rgba(255,255,255,0.25); }
        .btn { width: 100%; padding: 0.9rem; background: var(--gold); color: var(--bg); border: none; border-radius: var(--radius-sm); font-family: var(--font-body); font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; transition: all var(--transition-fast); }
        .btn:hover { background: var(--gold-light); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .form-error { color: var(--red); font-size: 0.8rem; margin-top: 0.5rem; display: none; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(10,10,10,0.3); border-top-color: var(--bg); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .login-footer { text-align: center; margin-top: 2rem; font-size: 0.8rem; color: var(--text-muted); }
        .login-footer a { color: var(--gold); text-decoration: none; cursor: pointer; }
        .footer { padding: 1.5rem 2rem; border-top: 1px solid var(--border); text-align: center; }
        .footer p { font-size: 0.7rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="header-logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#c9a962" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span>FreeWebsiteDesign.today</span>
        </a>
        <span class="badge">Client Portal</span>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <h1>Client <span class="text-gradient">Portal</span></h1>
            <p class="subtitle" id="formSubtitle">Sign in to manage your project.</p>
            <form id="loginForm" onsubmit="return handleSubmit(event)">
                <div class="form-group" id="nameGroup" style="display:none;">
                    <label for="name">Full Name</label>
                    <input type="text" class="form-input" id="name" placeholder="John Smith" autocomplete="name">
                </div>
                <div class="form-group" id="companyGroup" style="display:none;">
                    <label for="company">Business Name</label>
                    <input type="text" class="form-input" id="company" placeholder="Your Company LLC" autocomplete="organization">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" class="form-input" id="email" placeholder="you@company.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="••••••••" required minlength="6" autocomplete="current-password">
                </div>
                <button type="submit" class="btn" id="submitBtn">Sign In</button>
                <div class="form-error" id="formError"></div>
            </form>
            <div class="login-footer" id="toggleFooter">
                <p>Don't have an account? <a onclick="toggleSignup()">Create one</a></p>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2026 FreeWebsiteDesign.today. All rights reserved.</p>
    </div>

    <script>
    var API = '';
    var isSignup = false;

    if (localStorage.getItem('cp_token')) window.location.href = '/portal/dashboard.html';

    function toggleSignup() {
        isSignup = !isSignup;
        document.getElementById('nameGroup').style.display = isSignup ? 'block' : 'none';
        document.getElementById('companyGroup').style.display = isSignup ? 'block' : 'none';
        document.getElementById('submitBtn').textContent = isSignup ? 'Create Account' : 'Sign In';
        document.getElementById('formSubtitle').textContent = isSignup ? 'Create your portal account.' : 'Sign in to manage your project.';
        document.getElementById('password').autocomplete = isSignup ? 'new-password' : 'current-password';
        document.getElementById('toggleFooter').innerHTML = isSignup
            ? '<p>Already have an account? <a onclick="toggleSignup()">Sign in</a></p>'
            : '<p>Don\'t have an account? <a onclick="toggleSignup()">Create one</a></p>';
    }

    function handleSubmit(e) {
        e.preventDefault();
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;
        var btn = document.getElementById('submitBtn');
        var errEl = document.getElementById('formError');
        errEl.style.display = 'none';

        if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; errEl.style.display = 'block'; return false; }

        var payload = { email: email, password: password };
        var action = 'login';

        if (isSignup) {
            var name = document.getElementById('name').value.trim();
            var company = document.getElementById('company').value.trim();
            if (!name) { errEl.textContent = 'Please enter your name.'; errEl.style.display = 'block'; return false; }
            payload.name = name;
            payload.business_name = company;
            action = 'signup';
        }

        payload.action = action;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Please wait...';

        fetch(API + '/api/portal/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
        .then(function(r) {
            if (r.ok && r.data.token) {
                localStorage.setItem('cp_token', r.data.token);
                localStorage.setItem('cp_client', JSON.stringify(r.data.client));
                window.location.href = '/portal/dashboard.html';
            } else {
                errEl.textContent = r.data.error || 'Something went wrong.';
                errEl.style.display = 'block';
            }
        })
        .catch(function() { errEl.textContent = 'Network error. Please try again.'; errEl.style.display = 'block'; })
        .finally(function() { btn.disabled = false; btn.textContent = isSignup ? 'Create Account' : 'Sign In'; });
        return false;
    }
    </script>
</body>
</html>
